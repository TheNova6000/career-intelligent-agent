{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto mt-6">
    <div class="glass p-8 rounded-2xl">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">Company Intelligence Engine</h2>
            <div id="status-badge" class="px-3 py-1 bg-yellow-500/20 text-yellow-400 border border-yellow-500/50 rounded-full text-xs font-semibold animate-pulse">
                Researching...
            </div>
        </div>
        
        <div id="intel-content" class="hidden space-y-6">
            <div>
                <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-2">What They Do</h3>
                <p id="c-what" class="text-gray-100 bg-black/20 p-4 rounded-lg"></p>
            </div>
            <div>
                <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-2">Future Direction</h3>
                <p id="c-future" class="text-gray-100 bg-black/20 p-4 rounded-lg"></p>
            </div>
            <div>
                <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-2">Why They Are Hiring</h3>
                <p id="c-why" class="text-gray-100 bg-black/20 p-4 rounded-lg"></p>
            </div>
            <div>
                <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-2">Tech Stack</h3>
                <div id="c-tech" class="flex gap-2 flex-wrap bg-black/20 p-4 rounded-lg"></div>
            </div>
            <div class="pt-4 border-t border-gray-800 flex justify-end">
                <a href="/application/{{ opp_id }}" class="px-6 py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-lg font-semibold transition">
                    Proceed to Application Strategy &rarr;
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    window.onload = async () => {
        const oppId = {{ opp_id }};
        const res = await fetch(`/api/company/report/${oppId}`);
        const data = await res.json();
        
        if(data.report) {
            document.getElementById('c-what').innerText = data.report.what_company_does || "N/A";
            document.getElementById('c-future').innerText = data.report.future_direction || "N/A";
            document.getElementById('c-why').innerText = data.report.why_hiring || "N/A";
            
            const techContainer = document.getElementById('c-tech');
            (data.report.tech_they_care_about || []).forEach(t => {
                techContainer.innerHTML += `<span class="px-2 py-1 bg-gray-700 text-xs rounded">${t}</span>`;
            });

            document.getElementById('status-badge').className = "px-3 py-1 bg-green-500/20 text-green-400 border border-green-500/50 rounded-full text-xs font-semibold";
            document.getElementById('status-badge').innerText = "Research Complete";
            document.getElementById('intel-content').classList.remove('hidden');
        }
    };
</script>
{% endblock %}
