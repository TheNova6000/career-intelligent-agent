{% extends 'base.html' %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[80vh] text-center px-4 relative overflow-hidden">
    <!-- Decorative background elements -->
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-500/20 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-500/20 rounded-full blur-[100px] pointer-events-none"></div>
    
    <div class="relative z-10">
        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full border border-gray-700 bg-gray-800/50 text-xs font-medium text-gray-300 mb-8 backdrop-blur-md">
            <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
            System Online
        </div>
        
        <h1 class="text-5xl md:text-7xl font-extrabold mb-6 tracking-tight leading-tight">
            Your Autonomous <br>
            <span class="bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-purple-500 to-pink-500">
                Career Strategist
            </span>
        </h1>
        <p class="text-lg md:text-xl text-gray-400 max-w-2xl mx-auto mb-10 leading-relaxed">
            Stop manually searching for jobs, rewriting resumes, and writing cold emails. 
            Unify your entire career workflow into one intelligent assembly line.
        </p>
        <a href="/onboarding" class="inline-flex items-center justify-center px-8 py-4 bg-white hover:bg-gray-100 text-gray-900 rounded-full font-semibold text-lg transition-all hover:scale-105 shadow-[0_0_40px_-10px_rgba(255,255,255,0.3)]">
            Initialize Pipeline &rarr;
        </a>
    </div>
</div>
{% endblock %}
