{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto mt-6">
    <div class="glass p-8 rounded-2xl">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">Application Strategy & Skills Gap</h2>
            <div id="status-badge" class="px-3 py-1 bg-yellow-500/20 text-yellow-400 border border-yellow-500/50 rounded-full text-xs font-semibold animate-pulse">
                Analyzing Match...
            </div>
        </div>
        
        <div id="app-content" class="hidden space-y-6">
            <div class="p-6 bg-black/20 rounded-xl">
                <h3 class="text-xl font-semibold mb-4 text-white">Your Compatibility Match</h3>
                <div class="w-full bg-gray-800 rounded-full h-4 mb-2">
                  <div id="match-bar" class="bg-green-500 h-4 rounded-full transition-all duration-1000" style="width: 0%"></div>
                </div>
                <p id="match-score" class="text-right text-sm text-green-400 font-bold mb-4">0%</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-black/20 p-6 rounded-xl border border-gray-800/50">
                    <h3 class="text-lg font-semibold text-gray-200 mb-3 flex items-center gap-2">
                        <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        Strong Alignments
                    </h3>
                    <ul id="strong-alignments" class="list-disc list-inside text-gray-400 space-y-2 text-sm">
                        <!-- Populated by JS -->
                    </ul>
                </div>
                
                <div class="bg-black/20 p-6 rounded-xl border border-gray-800/50">
                    <h3 class="text-lg font-semibold text-gray-200 mb-3 flex items-center gap-2">
                        <svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        Identified Skill Gaps
                    </h3>
                    <ul id="skill-gaps" class="list-disc list-inside text-gray-400 space-y-2 text-sm">
                        <!-- Populated by JS -->
                    </ul>
                </div>
            </div>

            <div class="bg-black/20 p-6 rounded-xl">
                <h3 class="text-lg font-semibold text-gray-200 mb-3">Actionable Application Strategy</h3>
                <p id="app-strategy" class="text-gray-300 text-sm leading-relaxed whitespace-pre-wrap"></p>
            </div>
            
            <div class="pt-4 border-t border-gray-800 flex justify-between items-center">
                <a href="/company/{{ opp_id }}" class="text-gray-400 hover:text-white transition">
                    &larr; Back to Intelligence
                </a>
                <button onclick="generateColdEmail({{ opp_id }})" class="px-6 py-3 bg-purple-600 hover:bg-purple-500 text-white rounded-lg font-semibold transition flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    Draft Cold Email
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    window.onload = async () => {
        const oppId = {{ opp_id }};
        // Simulated API call for strategy generation
        setTimeout(() => {
            const data = {
                score: 85,
                strong: ["Python experience", "Familiarity with Web Development", "Enthusiasm for AI"],
                gaps: ["No direct Kubernetes experience", "Lacking enterprise architecture scaling"],
                strategy: "Focus your resume on your AI side projects. Emphasize your fast learning ability to cover the Kubernetes gap. Suggest a small 1-week sprint to build a simple k8s deployment to show initiative."
            };
            
            const matchScore = data.score;
            document.getElementById('match-score').innerText = `${matchScore}%`;
            document.getElementById('match-bar').style.width = `${matchScore}%`;
            
            const strongContainer = document.getElementById('strong-alignments');
            data.strong.forEach(item => {
                strongContainer.innerHTML += `<li>${item}</li>`;
            });

            const gapContainer = document.getElementById('skill-gaps');
            data.gaps.forEach(item => {
                gapContainer.innerHTML += `<li>${item}</li>`;
            });

            document.getElementById('app-strategy').innerText = data.strategy;

            document.getElementById('status-badge').className = "px-3 py-1 bg-green-500/20 text-green-400 border border-green-500/50 rounded-full text-xs font-semibold";
            document.getElementById('status-badge').innerText = "Strategy Ready";
            document.getElementById('app-content').classList.remove('hidden');
        }, 1500);
    };

    function generateColdEmail(id) {
        window.location.href = '/cold_email/' + id;
    }
</script>
{% endblock %}
